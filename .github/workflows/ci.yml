name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: akela
          POSTGRES_PASSWORD: akela
          POSTGRES_DB: akela_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U akela"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      # Mock mode for the app; this DB only exercises the Alembic round-trip test.
      TEST_DATABASE_URL: postgresql+asyncpg://akela:akela@localhost:5432/akela_test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install backend deps
        run: uv sync --extra dev

      - name: Lint + typecheck + test (mock mode; PG only for migration round-trip)
        run: |
          uv run ruff check src
          uv run ruff format --check src
          uv run mypy src/backend
          uv run pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install + build SPA
        run: |
          cd frontend
          npm ci
          npm run build
