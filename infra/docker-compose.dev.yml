# Local dev stack — Postgres + Traefik. No Supabase, no Stripe, no VPS (see ARCHITECTURE §6).
name: akela-host-dev

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: akela
      POSTGRES_PASSWORD: akela
      POSTGRES_DB: akela_host
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akela"]
      interval: 5s
      timeout: 3s
      retries: 10

  traefik:
    image: traefik:v3.2
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "8080:80"     # agents.akela-host.com routes (local)
      - "8081:8080"   # Traefik dashboard
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic

volumes:
  pgdata:
